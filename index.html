<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width"/>
		<link rel="stylesheet" href="style.css"/>
		<link rel="shortcut icon" href="icon.png"/>
		<title>Compiler Explorer</title>
	</head>
	<body>
		<div id="tabs">
			<div class="tab active" data-target="source">Source</div>
			<div id="status" class="tab" data-target="output">Output</div>
			<div class="tab" data-target="config">Config</div>
		</div>
		<div id="source" class="panel active"></div>
		<div id="output" class="panel">
			<input id="flags" placeholder="Compiler flags..."></input>
			<button id="recompile">Recompile</button>
			<button id="short-link">Short Link</button>
			<pre><code></code></pre>
		</div>
		<div id="config" class="panel">
			<b>Language:</b>
			<select id="lang-select"></select>
			<br/>
			<b>Compiler:</b>
			<select id="compiler-select"></select>
			<br/>
			<b>Libraries:</b>
			<div id="libs-select"></div>
		</div>

		<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.39.0/min/vs/loader.js"></script>
		<script type="module" src="script.js"></script>
	</body>
</html>
